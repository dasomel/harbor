name: "Sync Upstream"

on:
  schedule:
    - cron: '0 0 * * *' # 매일 자정(UTC)에 실행
  workflow_dispatch:   # 수동 실행 버튼 추가

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Sync Upstream
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
        run: |
          # Git remote URL을 PAT로 설정 (workflow 파일 push를 위해 필수)
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # 원본 저장소 등록 (이미 있으면 업데이트)
          if git remote | grep -q '^upstream$'; then
            git remote set-url upstream https://github.com/goharbor/harbor.git
          else
            git remote add upstream https://github.com/goharbor/harbor.git
          fi
          git fetch upstream

          # 사용자 이름과 이메일 설정 (머지를 위해 필요)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Fork-specific 파일 목록 (충돌 시 우리 버전 유지)
          FORK_SPECIFIC_FILES=(
            ".github/workflows/build-package.yml"
            ".github/workflows/sync-upstream.yml"
            ".github/workflows/conformance_test.yml"
            ".github/workflows/CI.yml"
            ".github/workflows/publish_release.yml"
            "README.md"
            "tests/ci/api_run.sh"
          )

          # 원본의 main 브랜치를 현재 저장소의 main으로 머지 시도
          if git merge upstream/main --no-edit; then
            echo "Successfully merged upstream changes."
            git push origin main
            echo "Pushed main branch to origin."
          else
            echo "Merge conflict detected. Resolving conflicts..."

            # Fork-specific 파일들에 대해 우리 버전 유지
            for file in "${FORK_SPECIFIC_FILES[@]}"; do
              if git diff --name-only --diff-filter=U | grep -q "^${file}$"; then
                echo "Keeping our version of: ${file}"
                git checkout --ours "${file}"
                git add "${file}"
              fi
            done

            # Fork-specific이 아닌 남은 충돌은 upstream 버전을 수용
            REMAINING_CONFLICTS=$(git diff --name-only --diff-filter=U || true)
            if [ -n "$REMAINING_CONFLICTS" ]; then
              echo "Accepting upstream version for non-fork-specific conflicts:"
              echo "$REMAINING_CONFLICTS"
              while IFS= read -r file; do
                [ -z "$file" ] && continue
                git checkout --theirs "$file"
                git add "$file"
              done <<< "$REMAINING_CONFLICTS"
            fi

            # 모든 충돌이 해결되었으면 커밋하고 푸시
            git commit -m "Merge upstream/main with fork-specific files preserved"
            git push origin main
            echo "Successfully merged with conflicts resolved."
          fi
